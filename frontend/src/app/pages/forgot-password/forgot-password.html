<div class="auth-page">
  <div class="auth-card card">
    <h3 class="auth-title">Forgot Password</h3>
    @if (sent()) {
      <div class="success-msg">Check your email for a reset link.</div>
    } @else {
      @if (error()) { <div class="error-msg">{{ error() }}</div> }
      <div class="form-field">
        <label>Email</label>
        <input type="email" placeholder="m@example.com" [ngModel]="email()" (ngModelChange)="email.set($event)" (keyup.enter)="submit()" />
      </div>
      <button class="btn btn-primary w-full" (click)="submit()" [disabled]="loading()">
        @if (loading()) { <span class="spinner-sm"></span> } Send Reset Link
      </button>
    }
    <p class="auth-footer"><a routerLink="/login">← Back to Login</a></p>
  </div>
</div>
