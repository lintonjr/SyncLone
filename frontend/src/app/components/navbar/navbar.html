<nav class="navbar">
  <div class="navbar-inner">
    <div class="navbar-left">
      <a routerLink="/" class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">ManaSync</span>
      </a>
      <div class="nav-links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
        <a routerLink="/events" routerLinkActive="active">My Events</a>
        <a routerLink="/create" routerLinkActive="active">Create Event</a>
      </div>
    </div>

    <div class="navbar-right">
      @if (auth.isLoggedIn()) {
        <div class="notif-wrapper">
          <button class="icon-btn" (click)="toggleNotifications(); $event.stopPropagation()" aria-label="Open notifications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
          </button>
          @if (showNotifications()) {
            <app-notification-panel (close)="showNotifications.set(false)" />
          }
        </div>
        <details class="user-menu-wrapper">
          <summary class="icon-btn user-btn">
            <span class="user-name">{{ auth.currentUser()?.display_name }}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </summary>
          <div class="user-dropdown">
            <a routerLink="/events" class="dropdown-item">My Events</a>
            <button class="dropdown-item danger" (click)="auth.logout()">Logout</button>
          </div>
        </details>
      } @else {
        <a routerLink="/login" class="btn btn-primary">Login</a>
      }
      <button class="icon-btn" (click)="theme.toggle()" aria-label="Toggle theme">
        @if (theme.isDark()) {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        }
      </button>
    </div>
  </div>
</nav>
