<div class="event-card" [routerLink]="['/event', event().id]">
  <div class="card-media">
    @if (event().thumbnail) {
      <img [src]="thumbnailUrl()" [alt]="event().name" class="card-img" />
    } @else {
      <div class="card-placeholder">
        <img src="/mercadia-logo.png" [alt]="event().name" class="card-placeholder-img" />
      </div>
    }
    <div class="card-overlay">
      <div class="card-top">
        <span class="status-badge" [class]="'status-' + event().status">{{ event().status }}</span>
      </div>
      <div class="card-bottom">
        <p class="card-game">{{ event().game }}{{ event().format ? ' · ' + event().format : '' }}</p>
        <h3 class="card-title">{{ event().name }}</h3>
        <div class="card-meta">
          <span class="meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            {{ event().date | date:'MMM d, y' }}
          </span>
          <span class="meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            {{ event().player_count ?? 0 }} players
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
