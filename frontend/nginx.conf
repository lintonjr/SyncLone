server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://backend:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # Server-Sent Events (GET /api/events/:id/stream) need to reach the client as they're
    # written, not held until nginx's buffer fills or the backend closes the connection.
    proxy_buffering off;
  }

  location /uploads/ {
    proxy_pass http://backend:3001;
    proxy_set_header Host $host;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
